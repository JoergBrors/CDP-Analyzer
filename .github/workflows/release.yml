name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            build_command: npm run dist:mac:arm
            artifact_name: cdp-analyzer-macos-arm64
            artifact_path: |
              dist/*.dmg
              dist/*.pkg
              dist/*.zip
          - name: Windows x64
            os: windows-latest
            build_command: npm run dist:win
            artifact_name: cdp-analyzer-windows-x64
            artifact_path: dist/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Use tag as package version
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build installer
        shell: bash
        run: ${{ matrix.build_command }}

      - name: List build output
        shell: bash
        run: find dist -maxdepth 1 -type f -print

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
            gh release edit "$GITHUB_REF_NAME" --latest
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --title "CDP Analyzer $GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME." \
              --latest
          fi
